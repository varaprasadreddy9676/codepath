version: '3.8'

services:
  # 1. Vector Semantic Store (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # 2. Structural Code Graph Database (Neo4j)
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt Protocol (Used by neo4rs natively)
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # 3. Universal State Database (Postgres)
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=readonly_user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 4. Distributed Trace Aggregator (Jaeger OpenTelemetry)
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Web UI
      - "14268:14268" # HTTP ingestion
    restart: unless-stopped

volumes:
  qdrant_storage:
  neo4j_data:
  postgres_data:
